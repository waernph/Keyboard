<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="resources/css/style.css">
    <title>Keyboard</title>
</head>

<body>
    <main>
        <div class="keyboard-body">
            <div class="display">
                <p class="logo" id="logo"></p>
                <p class="displayRow" id="row1">Display</p>
                <p class="displayRow" id="row2">rad2</p>
                <p class="displayRow" id="row3">rad3</p>
                <p class="displayRow" id="row4">rad4</p>
            </div>
            <div class="key-area">
                <button id="c" value="C4" class="white-key all-keys"><p>a</p></button>
                <button id="cSharp" value="C#4" class="black-key all-keys"> <p>w</p></button>
                <button id="d" value="D4" class="white-key all-keys"><p>s</p></button>
                <button id="dSharp" value="D#4" class="black-key all-keys"><p>e</p></button>
                <button id="e" value="E4" class="white-key all-keys"><p>d</p></button>
                <button id="f" value="F4" class="white-key all-keys"><p>f</p></button>
                <button id="fSharp" value="F#4" class="black-key all-keys"><p>t</p></button>
                <button id="g" value="G4" class="white-key all-keys"><p>g</p></button>
                <button id="gSharp" value="G#4" class="black-key all-keys"><p>y</p></button>
                <button id="a" value="A4" class="white-key all-keys"><p>h</p></button>
                <button id="aSharp" value="A#4" class="black-key all-keys"><p>u</p></button>
                <button id="b" value="B4" class="white-key all-keys"><p>j</p></button>
            </div>
        </div>
    </main>
</body>
<script src="resources/js/scripts.js"></script>

</html>
