<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="resources/css/style.css">
    <title>Keyboard</title>
</head>

<body>
    <main>
        <div class="keyboard-body">
            <div class="display">
                <p>Display</p>
                <p>rad1</p>
                <p>rad2</p>
                <p>rad3</p>
            </div>
            <div class="key-area">
                <button id="c" value="C4" class="white-key all-keys"></button>
                <button id="cSharp" value="C#4" class="black-key all-keys"></button>
                <button id="d" value="D4" class="white-key all-keys"></button>
                <button id="dSharp" value="D#4" class="black-key all-keys"></button>
                <button id="e" value="E4" class="white-key all-keys"></button>
                <button id="f" value="F4" class="white-key all-keys"></button>
                <button id="fSharp" value="F#4" class="black-key all-keys"></button>
                <button id="g" value="G4" class="white-key all-keys"></button>
                <button id="gSharp" value="G#4" class="black-key all-keys"></button>
                <button id="a" value="A4" class="white-key all-keys"></button>
                <button id="aSharp" value="A#4" class="black-key all-keys"></button>
                <button id="b" value="B4" class="white-key all-keys"></button>
            </div>
        </div>
    </main>
</body>
<script src="resources/js/scripts.js"></script>

</html>
